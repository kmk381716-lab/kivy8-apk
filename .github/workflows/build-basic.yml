name: Build APK Basic

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3 python3-pip openjdk-17-jdk libffi-dev libssl-dev libsqlite3-dev liblzma-dev libncurses5

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install cython
          pip install buildozer

      - name: Build APK
        run: buildozer android debug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
